<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .swiper-container {
  width: 100%;
  height: 400px; /* Задайте желаемую высоту слайдера */
}

.swiper-slide {
  text-align: center;
}

.slide-description {
  margin-top: 10px;
}

    </style>
    <!-- Подключение CSS-стилей Swiper -->
<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
<link rel="shortcut icon" href="4.png">
 <link rel="stylesheet" href="style.css">
<!-- Подключение JavaScript-файла Swiper -->
<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>// Создание нового экземпляра Swiper
var swiper = new Swiper('.swiper-container', {
  slidesPerView: 1, // Количество отображаемых слайдов
  spaceBetween: 10, // Расстояние между слайдами
  loop: true, // Бесконечная прокрутка
  navigation: {
    nextEl: '.swiper-button-next', // Кнопка "вперед"
    prevEl: '.swiper-button-prev', // Кнопка "назад"
  },
});</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступно к заказу</title>
</head>
<body>
    <div class="swiper-container">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="7.png" alt="Айс Латте">
            <div class="slide-description">Холодный кофе</div>
          </div>
		  <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="11.jpg" alt="Bubble Tea Фраппе">
            <div class="slide-description">Чай со сладкими шариками</div>
          </div>
          <div class="swiper-slide">
            <img src="coffee2.jpg" alt="Кофе 2">
            <div class="slide-description">Описание кофе 3</div>
            <div class="swiper-slide">
                <img src="coffee2.jpg" alt="Кофе 2">
                <div class="slide-description">Описание кофе 4</div>
                <div class="swiper-slide">
                    <img src="coffee2.jpg" alt="Кофе 2">
                    <div class="slide-description">Описание кофе 5</div>
        </div>
      </div>
      
</body>
</html>
